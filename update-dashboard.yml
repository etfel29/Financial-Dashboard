name: Update Dashboard

on:
  schedule:
    # Runs Mon–Fri at 9:30 PM UTC (5:30 PM ET, after market close)
    - cron: "30 21 * * 1-5"
  workflow_dispatch:   # lets you trigger it manually from GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch live data and inject into index.html
        run: python fetch_data.py

      - name: Commit and push updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
